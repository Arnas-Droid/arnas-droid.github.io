---
layout: default
---

{% if page.date %}
  <div class="blog">
    <span class="date">Date Published: {{ page.date | date: "%B %d, %Y" }}</span>
  </div>
{% endif %}

<h1>{{ page.title }}</h1>

{% if page.tags %}
  <div class="project-tags">
    <small>Tags:</small>
    {% for tag in page.tags %}
      <span>{{ tag }}</span>
    {% endfor %}
  </div>
{% endif %}

{{content}}
