---
layout: default
---

<small>{{ page.date | date: "%-d %B %Y" }}</small>
<h1>{{ page.title }}</h1>

<p class="view">by {{ page.author | default: site.author }}</p>

{% if page.tags %}
  <div class="project-tags">
    <small>Tags:</small>
    {% for tag in page.tags %}
      <span>{{ tag }}</span>
    {% endfor %}
  </div>
{% endif %}

{{content}}

{% if page.slideshow %}
  <script src="/assets/js/slideshow.js"></script>
{% endif %}
